<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Website Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            color: #34495e;
            font-size: 18px;
        }
        button {
            background-color: #e74c3c;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #c0392b;
        }
        #carMessage {
            margin-top: 20px;
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>
    <h1>Welcome to Car Website Test Page</h1>
    <p>This page is deployed via Jenkins CI/CD pipeline.</p>
    <button onclick="showMessage()">Click to Check Deployment</button>
    <div id="carMessage"></div>

    <script>
        function showMessage() {
            const messages = [
                "Pipeline Successful ✅",
                "Website is Live 🚀",
                "Jenkins CI/CD Working 👍"
            ];
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById("carMessage").innerText = randomMsg;
        }

        // Optional: auto log in console for testing
        console.log("Index page loaded successfully!");
    </script>
</body>
</html>
